name: Daily ADP Update

on:
  schedule:
    # 6:00 AM UTC daily (adjust offset if you want a specific local time)
    - cron: '0 10 * * *'   # 10:00 UTC = 6:00 AM ET
  workflow_dispatch:         # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to push the updated index.html

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest FantasyPros ADP
        run: node update-adp.js

      - name: Commit updated ADP (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && echo "No ADP changes today" || \
            git commit -m "chore: update FantasyPros ADP $(date +'%Y-%m-%d')"
          git push
